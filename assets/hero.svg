<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="1" stop-color="#1A2A6C"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#bg)"/>

  <!-- Orbit nodes -->
  <g opacity="0.9" filter="url(#glow)">
    <circle cx="160" cy="90" r="10" fill="#22C55E"/>
    <circle cx="250" cy="140" r="8" fill="#38BDF8"/>
    <circle cx="220" cy="250" r="9" fill="#F59E0B"/>
    <circle cx="120" cy="220" r="7" fill="#A78BFA"/>
    <circle cx="320" cy="80" r="7" fill="#F472B6"/>
  </g>
  <g stroke="#6EE7B7" stroke-opacity="0.35" stroke-width="2">
    <path d="M160 90L250 140L220 250L120 220L160 90Z"/>
    <path d="M250 140L320 80"/>
  </g>

  <!-- Title -->
  <text x="390" y="138" fill="#E5E7EB" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="46" font-weight="700">
    Free Search Aggregator
  </text>
  <text x="390" y="182" fill="#A5B4FC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="500">
    Multi-provider failover • Quota-aware • Task-level deep search
  </text>

  <!-- Chips -->
  <g>
    <rect x="390" y="218" width="150" height="38" rx="19" fill="url(#chip)"/>
    <text x="465" y="243" text-anchor="middle" fill="white" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">Auto Failover</text>

    <rect x="555" y="218" width="130" height="38" rx="19" fill="#0EA5E9"/>
    <text x="620" y="243" text-anchor="middle" fill="white" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">Task Search</text>

    <rect x="700" y="218" width="165" height="38" rx="19" fill="#10B981"/>
    <text x="782" y="243" text-anchor="middle" fill="white" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">Quota Tracking</text>
  </g>

  <!-- Right side mini chart -->
  <g transform="translate(980,72)">
    <rect width="160" height="220" rx="16" fill="#0B122A" stroke="#334155"/>
    <text x="16" y="28" fill="#93C5FD" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600">Providers</text>
    <rect x="16" y="46" width="128" height="10" rx="5" fill="#1E293B"/>
    <rect x="16" y="46" width="110" height="10" rx="5" fill="#22C55E"/>
    <rect x="16" y="74" width="128" height="10" rx="5" fill="#1E293B"/>
    <rect x="16" y="74" width="82" height="10" rx="5" fill="#38BDF8"/>
    <rect x="16" y="102" width="128" height="10" rx="5" fill="#1E293B"/>
    <rect x="16" y="102" width="56" height="10" rx="5" fill="#F59E0B"/>
    <text x="16" y="146" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Failover: ON</text>
    <text x="16" y="166" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Storage: Managed</text>
    <text x="16" y="186" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Mode: @dual / @deep</text>
  </g>
</svg>
